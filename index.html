<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AKTU बी.टेक. परिणाम</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: url('Untitled (6).png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Slim portrait card */
    .container {
      background: rgba(255, 255, 255, 0.96);
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 300px;
      text-align: center;
    }

    .logo {
      max-width: 65px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 18px;
      color: #800000;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    /* Fake captcha box */
    .captcha-container {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #555;
      border-radius: 3px;
      margin-right: 10px;
      position: relative;
    }

    .checkbox.checked::after {
      content: "✔";
      position: absolute;
      top: -2px;
      left: 2px;
      font-size: 16px;
      color: green;
    }

    .captcha-text {
      font-size: 0.9rem;
    }

    button {
      width: 100%;
      padding: 11px;
      background-color: #800000;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #a00000;
    }

    .error {
      color: red;
      font-size: 0.8rem;
      margin-bottom: 8px;
    }

    .note {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>

<body>

<div class="container">
  <img src="AKTU Logo.png" alt="AKTU Logo" class="logo" />
  <h1>AKTU बी.टेक. परिणाम</h1>

  <input type="text" id="roll" placeholder="अनुक्रमांक" />
  <input type="date" id="dob" />

  <!-- Fake CAPTCHA -->
  <div class="captcha-container" id="captchaBox">
    <div class="checkbox" id="checkbox"></div>
    <div class="captcha-text">I'm not a robot</div>
  </div>

  <div class="error" id="errorMsg"></div>

  <button id="viewResultBtn">आगे बढ़े</button>

  <p class="note">
    यह डॉ ए.पी.जे अब्दुल कलाम तकनीकी विश्वविद्यालय लखनऊ की<br />
    आधिकारिक ई-ऑनलाइन परिणाम सेवा है।<br />
    (एकेटीयू-एसडीसी द्वारा संचालित)
  </p>
</div>

<script>
  let isChecked = false;

  // Toggle fake captcha
  document.getElementById("captchaBox").addEventListener("click", function() {
    isChecked = !isChecked;
    document.getElementById("checkbox").classList.toggle("checked", isChecked);
  });

  document.getElementById("viewResultBtn").addEventListener("click", function() {
    const roll = document.getElementById("roll").value.trim();
    const dob = document.getElementById("dob").value;
    const errorMsg = document.getElementById("errorMsg");

    if (!roll || !dob) {
      errorMsg.textContent = "कृपया सभी विवरण भरें";
      return;
    }

    if (!isChecked) {
      errorMsg.textContent = "कृपया CAPTCHA सत्यापित करें";
      return;
    }

    errorMsg.textContent = "";

    // Redirect to your video
    window.location.href = "https://www.youtube.com/watch?v=m1FQmLAzy74";
  });
</script>

</body>
</html>
